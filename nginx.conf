server {
    listen 80;
    listen [::]:80;
    server_name your-domain.com;

    # Redirect all HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name your-domain.com;

    # --- TLS (or use: certbot --nginx -d your-domain.com) ---
    ssl_certificate     /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    root /var/www/i3x-connect;
    index index.html;

    # --- Security headers ---
    add_header X-Content-Type-Options  "nosniff"        always;
    add_header X-Frame-Options         "SAMEORIGIN"     always;
    add_header X-XSS-Protection        "1; mode=block"  always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;

    # --- PHP API: /api/posts, /api/comments, /api/featured, /api/status ---
    # Regex locations are matched in order; keep this before the deny-all below.
    location ~ ^/api/(posts|comments|featured|status)$ {
        fastcgi_pass   unix:/run/php/php8.2-fpm.sock;   # adjust PHP version as needed
        fastcgi_param  SCRIPT_FILENAME /var/www/i3x-connect/api/$1.php;
        include        fastcgi_params;
    }

    # Block everything else under /api/ (db.php, feed.db, scraper.py, .env, etc.)
    location ^~ /api/ {
        deny all;
        return 404;
    }

    # Static site files
    location / {
        try_files $uri $uri/ =404;
    }

    # Belt-and-suspenders: block sensitive file extensions and dev docs anywhere on the site
    location ~* \.(db|env|py|log|sh|md)$ {
        deny all;
        return 404;
    }
}
